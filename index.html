        function buildHM(h, startDate, numDays) {
            const days = h.days || ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            const today = todayStr();
            const cellMap = {};
            const cursor = new Date(startDate);
            for (let i = 0; i < numDays; i++) {
                const ds = cursor.toISOString().slice(0, 10);
                const dow = cursor.toLocaleDateString('en-US', { weekday: 'long' });
                const isExpected = days.includes(dow);
                const isDone = !!h.completions[ds];
                let cls = 'off';
                if (!isExpected) cls = 'off';
                else if (ds > today) cls = 'off';
                else if (isDone) cls = 'filled';
                else cls = 'faint';
                if (ds === today && isExpected) cls += ' today-hm';
                cellMap[ds] = cls;
                cursor.setDate(cursor.getDate() + 1);
            }
            // Group into Mon-Sun weeks
            const weeks = [];
            const iter = new Date(startDate);
            const endTs = startDate.getTime() + numDays * 86400000;
            const endDate = new Date(endTs);
            while (iter < endDate) {
                // Find Monday of this week (or stay at startDate if it falls earlier)
                let ws = new Date(iter);
                const dow = ws.getDay(); // 0=Sun, 1=Mon...
                if (dow !== 1) ws.setDate(ws.getDate() - (dow === 0 ? 6 : dow - 1));
                if (ws < startDate) ws = new Date(startDate);
                const label = ws.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const cells = [];
                for (let d = 0; d < 7; d++) {
                    const dd = new Date(ws);
                    dd.setDate(dd.getDate() + d);
                    const ds = dd.toISOString().slice(0, 10);
                    cells.push(cellMap[ds] || 'off');
                }
                weeks.push({ label, cells });
                iter.setDate(iter.getDate() + 7);
            }
            // Stats
            const allCells = Object.values(cellMap);
            const totalExpected = allCells.filter(c => c.includes('filled') || c.includes('faint')).length;
            const totalDone = allCells.filter(c => c.includes('filled')).length;
            const pct = totalExpected ? Math.round(totalDone / totalExpected * 100) : totalDone > 0 ? 100 : 0;
            // Missed list
            const missed = [];
            for (const [ds, cls] of Object.entries(cellMap)) {
                if (cls === 'faint') {
                    const dow = new Date(ds + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long' });
                    missed.push({ date: ds, dow });
                }
            }
            missed.sort((a, b) => a.date.localeCompare(b.date));
            return { weeks, pct, missed };
        }

        function renderHMGrid(hmData, large) {
            const { weeks } = hmData;
            if (!weeks.length) return '<div style="height:20px;"></div>';
            const dwLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const nCols = 1 + weeks.length;
            const cellPx = large ? 16 : 12;
            const dwPx = large ? 28 : 22;
            const gap = large ? 4 : 3;
            let html = '';
            // header row
            html += '<div class="hm-dow"></div>';
            weeks.forEach(w => { html += `<div class="hm-week-top">${w.label}</div>`; });
            // day rows
            for (let di = 0; di < 7; di++) {
                html += `<div class="hm-dow">${dwLabels[di]}</div>`;
                weeks.forEach(w => {
                    html += `<div class="hm-cell ${w.cells[di] || 'off'}"></div>`;
                });
            }
            return `<div class="hm-table" style="grid-template-columns:${dwPx}px repeat(${weeks.length},${cellPx}px);gap:${gap}px">${html}</div>`;
        }

                const hmStart = new Date(Math.max(createdDate.getTime(), Date.now() - 27 * 86400000));

        function computeStreak(h) {
            const days = h.days || ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            let streak = 0;
            let d = new Date();
            let safety = 1000;
            while (safety--) {
                const ds = d.toISOString().slice(0, 10);
                const dow = d.toLocaleDateString('en-US', { weekday: 'long' });
                if (!days.includes(dow)) { d.setDate(d.getDate() - 1); continue; }
                if (h.completions[ds]) { streak++; d.setDate(d.getDate() - 1); } else break;
            }
            return streak;
        }

                    vv.stream = stream;
                    vv.chunks = [];
                    const recorder = new MediaRecorder(stream);
                    vv.recorder = recorder;
                    recorder.ondataavailable = e => { if (e.data.size) vv.chunks.push(e.data); };
                    recorder.onstop = () => {
                        const blob = new Blob(vv.chunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = ev => {
                            const dur = vv.startTime ? (Date.now() - vv.startTime) / 1000 : 0;
                            const a = { id: uid(), title: '', data: ev.target.result, duration: dur, tags: [], createdAt: Date.now() };
                            openVoiceModal(a, true);
                        };
                        reader.readAsDataURL(blob);
                        cleanup();
                    };
                    recorder.start(250);
                    vv.startTime = Date.now();
                    btn.classList.add('recording');
                    btn.textContent = '◼';
                    stopBtn.style.display = 'block';
                    timerEl.textContent = '00:00';

                    // Timer

                        const elapsed = Math.floor((Date.now() - vv.startTime) / 1000);
                        timerEl.textContent = `${String(Math.floor(elapsed / 60)).padStart(2, '0')}:${String(elapsed % 60).padStart(2, '0')}`;
                    }, 200);
                    // Waveform
                    try {
                        const ctx = new AudioContext();
                        const src = ctx.createMediaStreamSource(stream);
                        const analyser = ctx.createAnalyser();
                        analyser.fftSize = 64;
                        src.connect(analyser);
                        vv.analyser = analyser;
                        vv.dataArray = new Uint8Array(analyser.frequencyBinCount);
                        const bars = 32;
                        waveEl.innerHTML = Array(bars).fill('<div class="vv-wave"></div>').join('');
                        const waveBars = waveEl.children;
                        function draw() {
                            if (recorder.state === 'inactive') { vv.animFrame = null; return; }
                            analyser.getByteFrequencyData(vv.dataArray);
                            for (let i = 0; i < bars; i++) {
                                const idx = Math.floor(i / bars * vv.dataArray.length);
                                const val = vv.dataArray[idx] / 255;
                                waveBars[i].style.height = (4 + val * 40) + 'px';
                            }
                            vv.animFrame = requestAnimationFrame(draw);
                        }
                        draw();
                    } catch (e) { /* waveform not available */ }

      <div class="stat"><div class="stat-num">${todaySessions.reduce((a, s) => a + s.minutes, 0)}</div><div class="stat-label">Minutes</div></div>

  </div>
  ${setup.isConfigured && setup.currentSession ? `
  <div class="widget" style="max-width:400px; margin:16px auto 0;">
    <div class="widget-header"><div class="widget-title">Session configuration</div></div>
    <div class="stat-row">
      <div class="stat"><div class="stat-num">${setup.sessionDuration}</div><div class="stat-label">min focus</div></div>
      <div class="stat"><div class="stat-num">${setup.numBreaks}</div><div class="stat-label">breaks</div></div>
      <div class="stat"><div class="stat-num">${setup.breakDuration}</div><div class="stat-label">min break</div></div>
    </div>
  </div>
  ` : ''}
  `;
        }
        function attachPomodoroEvents() {
            const setupBtn = document.getElementById('setupSessionBtn');
            if (setupBtn) {
                setupBtn.onclick = () => {
                    openSessionSetupModal();
                };
            }

            const p = state.pomo;
            const setup = state.sessionSetup;

            document.getElementById('pomoToggle').onclick = () => {
                p.running = !p.running;
                if (p.running) {
                    if (p.timer) clearInterval(p.timer);
                    p.timer = setInterval(async () => {
                        p.remaining--;
                        if (p.remaining <= 0) {
                            clearInterval(p.timer);
                            p.running = false;
                            if (p.mode === 'work') {
                                await dbPut('focusSessions', { id: uid(), minutes: setup.isConfigured ? setup.sessionDuration : p.workMin, completedAt: Date.now() });
                                state.focusSessions = await dbGetAll('focusSessions');

                                // If using configured session
                                if (setup.isConfigured && setup.currentSession) {
                                    setup.currentSession.currentBreakIndex++;
                                    if (setup.currentSession.currentBreakIndex >= setup.currentSession.breaks.length) {
                                        // Session complete
                                        toast('✓ Focus session complete — excellent work!');
                                        setup.isConfigured = false;
                                        setup.currentSession = null;
                                        p.mode = 'work';
                                        p.remaining = p.workMin * 60;
                                    } else {
                                        // Move to break
                                        p.mode = 'break';
                                        p.remaining = setup.breakDuration * 60;
                                        toast('Break time — recharge and refresh');
                                    }
                                } else {
                                    // Use default pomodoro
                                    p.sessionCount++;
                                    p.mode = (p.sessionCount % 4 === 0) ? 'longbreak' : 'break';
                                    p.remaining = (p.mode === 'longbreak' ? p.longBreakMin : p.breakMin) * 60;
                                    toast('Focus session complete — take a break');
                                }
                            } else {
                                p.mode = 'work';
                                p.remaining = setup.isConfigured ? setup.sessionDuration * 60 : p.workMin * 60;
                                toast('Break over — back to focus');
                            }
                        }
                        if (state.view === 'pomodoro') updatePomoDisplay();
                    }, 1000);
                } else {
                    clearInterval(p.timer);
                }
                render();
            };
            document.getElementById('pomoReset').onclick = () => {
                clearInterval(p.timer);
                p.running = false;
                p.mode = 'work';
                if (setup.isConfigured) {
                    p.remaining = setup.sessionDuration * 60;
                } else {
                    p.remaining = p.workMin * 60;
                }
                render();
            };
            document.getElementById('pomoWork').onchange = (e) => {
                p.workMin = parseInt(e.target.value) || 25;
                if (p.mode === 'work' && !p.running && !setup.isConfigured) p.remaining = p.workMin * 60;
                render();
            };
            document.getElementById('pomoBreak').onchange = (e) => {
                p.breakMin = parseInt(e.target.value) || 5;
                render();
            };
        }
        function updatePomoDisplay() {
            const p = state.pomo;
            const mins = Math.floor(p.remaining / 60).toString().padStart(2, '0');
            const secs = (p.remaining % 60).toString().padStart(2, '0');
            const el = document.querySelector('.pomo-timer');
            if (el) el.textContent = `${mins}:${secs}`;
            const modeEl = document.querySelector('.pomo-mode');
            if (modeEl) modeEl.textContent = p.mode === 'work' ? 'Focus session' : 'Break';
        }

        /* ============================================================

        function renderGraph() {
            return `<div class="graph-wrap" id="graphWrap"><svg class="graph-lines" id="graphLines"></svg></div>
  <div style="margin-top:10px; font-size:12px; color:var(--ink-soft);">Showing tasks, notes, ideas and goals connected through links and shared tags. Click a node to open it.</div>`;
        }
        function attachGraphEvents() {
            const wrap = document.getElementById('graphWrap');
            if (!wrap) return;
            const W = wrap.clientWidth, H = wrap.clientHeight;

            // build node list
            const nodes = [];
            state.tasks.forEach(t => nodes.push({ id: 'task|' + t.id, type: 'task', title: t.title, tags: t.tags, links: t.links || [] }));
            state.notes.forEach(n => nodes.push({ id: 'note|' + n.id, type: 'note', title: n.title || 'Untitled', tags: n.tags, links: n.links || [] }));
            state.ideas.forEach(i => nodes.push({ id: 'idea|' + i.id, type: 'idea', title: i.title, tags: i.tags, links: i.links || [] }));
            state.goals.forEach(g => nodes.push({ id: 'goal|' + g.id, type: 'goal', title: g.title, tags: [], links: [] }));

            if (!nodes.length) {
                wrap.innerHTML = `<div class="empty-state" style="padding-top:100px;"><div class="empty-state-title">Nothing to graph yet</div><div class="empty-state-sub">Create tasks, notes, ideas and goals, then link them to see connections.</div></div>`;
                return;
            }

            // build edges from explicit links + shared tags
            const edges = [];
            nodes.forEach(n => {
                (n.links || []).forEach(l => {
                    const targetId = l.type + '|' + l.id;
                    if (nodes.find(x => x.id === targetId)) edges.push([n.id, targetId]);
                });
            });
            // shared tags
            for (let a = 0; a < nodes.length; a++) {
                for (let b = a + 1; b < nodes.length; b++) {
                    if (nodes[a].tags.length && nodes[b].tags.some(t => nodes[a].tags.includes(t))) {
                        edges.push([nodes[a].id, nodes[b].id]);
                    }
                }
            }

            // simple circular layout
            const cx = W / 2, cy = H / 2, r = Math.min(W, H) * 0.38;
            nodes.forEach((n, idx) => {
                const angle = (idx / nodes.length) * Math.PI * 2;
                n.x = cx + Math.cos(angle) * r;
                n.y = cy + Math.sin(angle) * r;
            });

            const icon = { task: '☑', note: '▤', idea: '✦', goal: '◎' };
            wrap.innerHTML = `<svg class="graph-lines" id="graphLines" width="${W}" height="${H}">
    ${edges.map(([a, b]) => {
                const na = nodes.find(x => x.id === a), nb = nodes.find(x => x.id === b);
                if (!na || !nb) return '';
                return `<line x1="${na.x}" y1="${na.y}" x2="${nb.x}" y2="${nb.y}" stroke="var(--line)" stroke-width="1"/>`;
            }).join('')}
  </svg>
  ${nodes.map(n => `<div class="graph-node" style="left:${n.x}px; top:${n.y}px;" data-graph-node="${n.id}">${icon[n.type]} ${escapeHtml(n.title.slice(0, 28))}</div>`).join('')}
  `;
            document.querySelectorAll('[data-graph-node]').forEach(el => {
                el.onclick = () => {
                    const [type, id] = el.dataset.graphNode.split('|');
                    if (type === 'task') openTaskModal(id);
                    if (type === 'note') openNoteModal(id);
                    if (type === 'idea') openIdeaModal(id);
                    if (type === 'goal') setView('goals');
                };
            });
        }

            const maxCompleted = Math.max(...completedByDay, 1);
            const maxFocus = Math.max(...focusByDay, 1);

            // Comprehensive data analysis
            const totalTasks = state.tasks.length;
            const completedTasks = state.tasks.filter(t => t.status === 'completed').length;
            const activeTasks = state.tasks.filter(t => t.status === 'active').length;
            const overdueTasks = state.tasks.filter(t => t.dueDate && !t.completedAt && new Date(t.dueDate) < new Date()).length;
            const tasksByPriority = { high: state.tasks.filter(t => t.priority === 'high').length, medium: state.tasks.filter(t => t.priority === 'medium').length, low: state.tasks.filter(t => t.priority === 'low').length };

            // Notes & Ideas analytics
            const totalNotes = state.notes.length;

            const ideasByTag = {};

            // Habit analytics
            const totalHabits = state.habits.length;
            const activeHabits = state.habits.filter(h => h.streak > 0).length;
            const totalHabitStreak = state.habits.reduce((a, h) => a + h.streak, 0);
            const avgHabitStreak = totalHabits ? Math.round(totalHabitStreak / totalHabits) : 0;

            // Goal analytics
            const totalGoals = state.goals.length;
            const completedGoals = state.goals.filter(g => g.progress >= 100).length;
            const avgGoalProgress = totalGoals ? Math.round(state.goals.reduce((a, g) => a + g.progress, 0) / totalGoals) : 0;

            // Voice vault analytics
            const totalVoiceRecordings = state.audioVault.length;
            const totalVoiceDuration = state.audioVault.reduce((sum, a) => sum + (a.duration || 0), 0);
            const avgVoiceLength = totalVoiceRecordings ? Math.round(totalVoiceDuration / totalVoiceRecordings) : 0;

            // Focus sessions analytics
            const totalFocusSessions = state.focusSessions.length;
            const totalFocusMinutes = state.focusSessions.reduce((a, s) => a + s.minutes, 0);
            const thisWeekSessions = state.focusSessions.filter(s => Date.now() - s.completedAt < 7 * 86400000).length;
            const thisWeekMinutes = state.focusSessions.filter(s => Date.now() - s.completedAt < 7 * 86400000).reduce((a, s) => a + s.minutes, 0);

            // Scoring
            const habitScore = state.habits.length ? Math.round(state.habits.reduce((a, h) => a + Math.min(h.streak, 7), 0) / (state.habits.length * 7) * 100) : 0;
            const goalScore = state.goals.length ? Math.round(state.goals.reduce((a, g) => a + g.progress, 0) / state.goals.length) : 0;
            const taskScore = totalTasks ? Math.round(completedTasks / totalTasks * 100) : 0;
            const focusScore = Math.min(100, Math.round(thisWeekSessions / 14 * 100));
            const productivityScore = Math.round((habitScore + goalScore + taskScore + focusScore) / 4);

            // All tags across the system
            const allTags = {};
            state.tasks.forEach(t => (t.tags || []).forEach(tag => { allTags[tag] = (allTags[tag] || 0) + 1; }));
            state.notes.forEach(n => (n.tags || []).forEach(tag => { allTags[tag] = (allTags[tag] || 0) + 1; }));
            state.ideas.forEach(i => (i.tags || []).forEach(tag => { allTags[tag] = (allTags[tag] || 0) + 1; }));
            state.audioVault.forEach(a => (a.tags || []).forEach(tag => { allTags[tag] = (allTags[tag] || 0) + 1; }));
            const topTags = Object.entries(allTags).sort((a, b) => b[1] - a[1]).slice(0, 8);

            return `

        function updateCaseOutput(type) {
            const text = document.getElementById('caseInput').value;
            if (!type) { document.getElementById('caseOutput').textContent = text; return; }
            let result = '';

            switch (type) {
                case 'upper': result = text.toUpperCase(); break;
                case 'lower': result = text.toLowerCase(); break;
                case 'title': result = text.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); break;
                case 'sentence': result = text.charAt(0).toUpperCase() + text.slice(1).toLowerCase(); break;
                case 'toggle': result = text.split('').map(c => c === c.toUpperCase() ? c.toLowerCase() : c.toUpperCase()).join(''); break;
                case 'camel': result = text.split(' ').map((w, i) => i === 0 ? w.toLowerCase() : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(''); break;
            }

            document.getElementById('caseOutput').textContent = result;
        }

        async function updateHashOutput() {
            const text = document.getElementById('hashInput').value;
            if (!text) {
                document.getElementById('hashSHA256').textContent = '';
                document.getElementById('hashSHA512').textContent = '';
                return;
            }

            try {
                const buffer256 = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
                const hash256 = Array.from(new Uint8Array(buffer256)).map(b => b.toString(16).padStart(2, '0')).join('');
                document.getElementById('hashSHA256').textContent = hash256;

                const buffer512 = await crypto.subtle.digest('SHA-512', new TextEncoder().encode(text));
                const hash512 = Array.from(new Uint8Array(buffer512)).map(b => b.toString(16).padStart(2, '0')).join('');
                document.getElementById('hashSHA512').textContent = hash512;
            } catch (e) { toast('Hash error'); }
        }

        function encryptText(mode) {
            const text = mode === 'encrypt' ? document.getElementById('encryptText').value : document.getElementById('decryptText').value;
            const pass = mode === 'encrypt' ? document.getElementById('encryptPass').value : document.getElementById('decryptPass').value;

            if (!text || !pass) { toast('Fill all fields'); return; }

            try {
                if (mode === 'encrypt') {
                    const encoded = btoa(encodeURIComponent(text));
                    const key = btoa(pass);
                    const result = Array.from(encoded).map((c, i) => String.fromCharCode(c.charCodeAt(0) ^ key[i % key.length].charCodeAt(0))).join('');
                    document.getElementById('encryptOutput').textContent = btoa(result);
                    toast('Encrypted');
                } else {
                    const decoded = atob(text);
                    const key = btoa(pass);
                    const result = Array.from(decoded).map((c, i) => String.fromCharCode(c.charCodeAt(0) ^ key[i % key.length].charCodeAt(0))).join('');
                    document.getElementById('decryptOutput').textContent = decodeURIComponent(atob(result));
                    toast('Decrypted');
                }
            } catch (e) { toast('Error: invalid format or passphrase'); }
        }

        function checkPasswordStrength() {
            const pass = document.getElementById('strengthInput').value;
            let strength = 0;
            const checks = [];

            if (pass.length >= 8) { strength += 20; checks.push('✓ Length ≥ 8'); }
            if (pass.length >= 12) { strength += 20; checks.push('✓ Length ≥ 12'); }
            if (/[a-z]/.test(pass)) { strength += 20; checks.push('✓ Lowercase'); }
            if (/[A-Z]/.test(pass)) { strength += 20; checks.push('✓ Uppercase'); }
            if (/[0-9]/.test(pass)) { strength += 20; checks.push('✓ Numbers'); }
            if (/[^a-zA-Z0-9]/.test(pass)) { strength += 20; checks.push('✓ Symbols'); }

            const level = strength === 0 ? 'None' : strength <= 40 ? 'Weak' : strength <= 60 ? 'Fair' : strength <= 80 ? 'Good' : 'Excellent';
            const color = strength === 0 ? 'var(--red)' : strength <= 40 ? 'var(--red)' : strength <= 60 ? 'var(--orange)' : strength <= 80 ? 'var(--green)' : 'var(--green)';

            document.getElementById('strengthBar').style.width = strength + '%';
            document.getElementById('strengthBar').style.background = color;
            document.getElementById('strengthText').textContent = level;
            document.getElementById('strengthDetails').innerHTML = checks.join('<br>') || 'Start typing…';

        function calculateAge() {
            const birthValue = document.getElementById('birthDate').value;
            if (!birthValue) return;
            const birthDate = new Date(birthValue + 'T12:00:00');
            if (Number.isNaN(birthDate.getTime())) return;
            const today = new Date();

            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();

            if (days < 0) { months--; days += new Date(today.getFullYear(), today.getMonth(), 0).getDate(); }
            if (months < 0) { years--; months += 12; }

            const totalDays = Math.floor((today - birthDate) / (1000 * 60 * 60 * 24));

            document.getElementById('ageYears').textContent = years;
            document.getElementById('ageMonths').textContent = months;
            document.getElementById('ageDays').textContent = days;
            document.getElementById('ageTotalDays').textContent = totalDays.toLocaleString();
        }

                sw.interval = setInterval(() => {

                clearInterval(sw.interval);
                sw.interval = null;
            }
        }

                const parsed = JSON.parse(text);
                const formatted = JSON.stringify(parsed, null, 2);
                document.getElementById('jsonOutput').textContent = formatted;
            } catch (e) {
                document.getElementById('jsonOutput').textContent = 'Invalid JSON: ' + e.message;
            }
        }

        function renderCSVViewer() {
            return `
    <div class="tool-form">
        <div class="form-group">
            <label>CSV Data</label>
            <textarea id="csvInput" placeholder="Paste CSV data…"></textarea>
        </div>
        <div style="overflow-x:auto;">
            <div id="csvOutput"></div>
        </div>
    </div>
            `;
        }

        function parseCSV() {
            const text = document.getElementById('csvInput').value;
            const lines = text.trim().split('\n');
            let html = '<table style="width:100%; border-collapse:collapse; font-size:12px;">';

            lines.forEach((line, i) => {
                const cells = line.split(',');
                html += `<tr>`;
                cells.forEach(cell => {
                    const tag = i === 0 ? 'th' : 'td';
                    html += `<${tag} style="border:1px solid var(--line-soft); padding:8px; text-align:left; ${i === 0 ? 'background:var(--bg); font-weight:600;' : ''}">${escapeHtml(cell.trim())}</${tag}>`;
                });
                html += `</tr>`;
            });

            html += '</table>';
            document.getElementById('csvOutput').innerHTML = html;
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        /* ============================================================
           SETTINGS / EXPORT / IMPORT
           ============================================================ */
        function renderSettings() {
            return `
  <div class="widget" style="max-width:560px;">
    <div class="widget-header"><div class="widget-title">Data &amp; backup</div></div>
    <p style="font-size:13px; color:var(--ink-soft); margin-bottom:14px; line-height:1.6;">
      All data is stored locally on this device using IndexedDB. Export a backup regularly, or import a previous backup to restore your data.
    </p>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-primary" id="exportBtn">Export backup (JSON)</button>
      <label class="btn" style="cursor:pointer;">Import backup<input type="file" id="importInput" accept=".json" style="display:none;"></label>
      <button class="btn" style="color:var(--warn);" id="clearBtn">Clear all data</button>
    </div>
  </div>
  <div class="widget" style="max-width:560px; margin-top:14px;">
    <div class="widget-header"><div class="widget-title">Storage summary</div></div>
    <div class="stat-row">
      <div class="stat"><div class="stat-num">${state.tasks.length}</div><div class="stat-label">Tasks</div></div>
      <div class="stat"><div class="stat-num">${state.notes.length}</div><div class="stat-label">Notes</div></div>
      <div class="stat"><div class="stat-num">${state.ideas.length}</div><div class="stat-label">Ideas</div></div>
      <div class="stat"><div class="stat-num">${state.goals.length}</div><div class="stat-label">Goals</div></div>
    </div>
  </div>
  `;
        }
        function attachSettingsEvents() {
            document.getElementById('exportBtn').onclick = async () => {
                const data = {};
                for (const s of STORES.filter(s => s !== 'meta')) { data[s] = await dbGetAll(s); }
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `cabinet-backup-${todayStr()}.json`;
                a.click();
                URL.revokeObjectURL(url);
                toast('Backup downloaded');
            };
            document.getElementById('importInput').onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const text = await file.text();
                try {
                    const data = JSON.parse(text);
                    for (const s of STORES.filter(s => s !== 'meta')) {
                        if (data[s]) {
                            for (const item of data[s]) await dbPut(s, item);
                        }
                    }
                    await loadAll();
                    render();
                    toast('Backup imported');
                } catch (err) { toast('Invalid backup file'); }
            };
            document.getElementById('clearBtn').onclick = async () => {
                if (!confirm('This will permanently delete all local data. Continue?')) return;
                for (const s of STORES) {
                    const all = await dbGetAll(s);
                    for (const item of all) await dbDelete(s, item.id);
                }
                await loadAll();
                render();
                toast('All data cleared');
            };
        }

        /* ============================================================
           GLOBAL SEARCH
           ============================================================ */
        let searchTimer;
        document.getElementById('globalSearch').addEventListener('input', (e) => {
            clearTimeout(searchTimer);
            const q = e.target.value.trim().toLowerCase();
            searchTimer = setTimeout(() => {
                if (!q) { render(); return; }
                renderSearchResults(q);
            }, 150);
        });
        function renderSearchResults(q) {
            const c = document.getElementById('content');
            document.getElementById('pageTitle').textContent = 'Search';

            const matchTasks = state.tasks.filter(t => t.title.toLowerCase().includes(q) || (t.tags || []).some(tag => tag.toLowerCase().includes(q)));
            const matchNotes = state.notes.filter(n => (n.title || '').toLowerCase().includes(q) || (n.content || '').toLowerCase().includes(q) || (n.tags || []).some(tag => tag.toLowerCase().includes(q)));
            const matchIdeas = state.ideas.filter(i => i.title.toLowerCase().includes(q) || (i.content || '').toLowerCase().includes(q) || (i.tags || []).some(tag => tag.toLowerCase().includes(q)));
            const matchGoals = state.goals.filter(g => g.title.toLowerCase().includes(q));
            const matchLinks = state.links.filter(l => (l.title || '').toLowerCase().includes(q) || l.url.toLowerCase().includes(q));
            const matchHabits = state.habits.filter(h => h.name.toLowerCase().includes(q));

            const total = matchTasks.length + matchNotes.length + matchIdeas.length + matchGoals.length + matchLinks.length + matchHabits.length;

            if (!total) {
                c.innerHTML = `<div class="empty-state"><div class="empty-state-title">No results for "${escapeHtml(q)}"</div><div class="empty-state-sub">Try a different keyword or tag.</div></div>`;
                return;
            }

            let html = '<div class="search-results">';
            if (matchTasks.length) html += `<div class="search-group"><div class="search-group-title">Tasks (${matchTasks.length})</div>${matchTasks.map(t => taskRowFull(t)).join('')}</div>`;
            if (matchNotes.length) html += `<div class="search-group"><div class="search-group-title">Notes (${matchNotes.length})</div><div class="notes-grid">${matchNotes.map(n => `<div class="note-card" data-open-note="${n.id}"><div class="note-card-title">${escapeHtml(n.title || 'Untitled')}</div><div class="note-card-body">${escapeHtml((n.content || '').slice(0, 160))}</div></div>`).join('')}</div></div>`;
            if (matchIdeas.length) html += `<div class="search-group"><div class="search-group-title">Ideas (${matchIdeas.length})</div><div class="notes-grid">${matchIdeas.map(i => `<div class="note-card" data-open-idea="${i.id}"><div class="note-card-title">${escapeHtml(i.title)}</div><div class="note-card-body">${escapeHtml((i.content || '').slice(0, 160))}</div><span class="status-pill">${i.status}</span></div>`).join('')}</div></div>`;
            if (matchGoals.length) html += `<div class="search-group"><div class="search-group-title">Goals (${matchGoals.length})</div>${matchGoals.map(g => `<div class="item-row" data-goto="goals" style="display:block;"><div class="item-title">${escapeHtml(g.title)}</div></div>`).join('')}</div>`;
            if (matchLinks.length) html += `<div class="search-group"><div class="search-group-title">Links (${matchLinks.length})</div>${matchLinks.map(l => `<div class="item-row" data-open-link="${l.id}"><div class="item-body"><div class="item-title">${escapeHtml(l.title || l.url)}</div></div></div>`).join('')}</div>`;
            if (matchHabits.length) html += `<div class="search-group"><div class="search-group-title">Routines (${matchHabits.length})</div>${matchHabits.map(h => `<div class="item-row" data-goto="routines" style="display:block;"><div class="item-title">${escapeHtml(h.name)}</div></div>`).join('')}</div>`;
            html += '</div>';
            c.innerHTML = html;

            document.querySelectorAll('[data-goto]').forEach(el => el.addEventListener('click', () => setView(el.dataset.goto)));
            document.querySelectorAll('[data-open-task]').forEach(el => el.addEventListener('click', (e) => { if (e.target.closest('[data-toggle-task]') || e.target.closest('[data-toggle-subtask]') || e.target.closest('.subtask-inline-row')) return; openTaskModal(el.dataset.openTask); }));
            document.querySelectorAll('[data-toggle-task]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); toggleTask(el.dataset.toggleTask).then(renderSearchResults.bind(null, q)); }));
            document.querySelectorAll('[data-toggle-subtask]').forEach(el => el.addEventListener('click', (e) => {
                e.stopPropagation();
                const [taskId, subId] = el.dataset.toggleSubtask.split('|');
                toggleSubtask(taskId, subId);
                setTimeout(() => renderSearchResults(q), 0);
            }));
            document.querySelectorAll('[data-open-note]').forEach(el => el.addEventListener('click', () => openNoteModal(el.dataset.openNote)));
            document.querySelectorAll('[data-open-idea]').forEach(el => el.addEventListener('click', () => openIdeaModal(el.dataset.openIdea)));
            document.querySelectorAll('[data-open-link]').forEach(el => el.addEventListener('click', () => {
                const link = state.links.find(l => l.id === el.dataset.openLink);
                if (link) window.open(link.url, '_blank');
            }));
        }

        /* ============================================================
           INIT
           ============================================================ */
        async function init() {
            try {
                document.getElementById('dateToday').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
                await openDB();
                await seedIfEmpty();
                await loadAll();
                render();
            } catch (err) {
                console.error(err);
                toast('Failed to load app data');
                document.getElementById('content').innerHTML = '<div class="empty-state"><div class="empty-state-title">Could not load Cabinet</div><div class="empty-state-sub">Try refreshing the page or clearing site data in your browser settings.</div></div>';
            }
        }
        init();
    </script>
</body>

</html>
