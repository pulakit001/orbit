                                    <rect x="2" y="8" width="3" height="6" rx="0.5" />
                                    <rect x="6.5" y="5" width="3" height="9" rx="0.5" />
                                    <rect x="11" y="2" width="3" height="12" rx="0.5" />
                                </svg></span><span>Analytics</span></div>
                    </div>
                </div>
                <div class="nav-section">
                    <div class="nav-label">Utilities</div>
                    <div class="nav-item" data-view="tools">
                        <div class="nav-item-label"><span class="icon"><svg width="16" height="16" viewBox="0 0 16 16"
                                    fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path
                                        d="M2 4h3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z" />
                                    <circle cx="8" cy="9" r="2" fill="currentColor" />
                                </svg></span><span>Tools</span></div>
                    </div>
                </div>
                <div class="nav-section">
                    <div class="nav-label">System</div>
                    <div class="nav-item" data-view="settings">
                        <div class="nav-item-label"><span class="icon"><svg width="16" height="16" viewBox="0 0 16 16"
                                    fill="none" stroke="currentColor" stroke-width="1.5">
                                    <circle cx="8" cy="8" r="2" />
                                    <path d="M8 1.5v1.5M8 13v1.5M1.5 8H3M13 8h1.5" />
                                </svg></span><span>Settings &amp; data</span></div>
                    </div>
                </div>
            </nav>
            <div class="sidebar-footer">
            </div>
        </aside>

        <!-- MAIN -->
        <div class="main">
            <div class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menuToggle" aria-label="Menu"><svg width="16" height="16"
                            viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M2 4h12M2 8h12M2 12h12" />
                        </svg></button>
                    <div class="page-title" id="pageTitle">Dashboard</div>
                    <div class="search-wrap">
                        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"
                                stroke="currentColor" stroke-width="1.5">
                                <circle cx="7" cy="7" r="4.5" />
                                <path d="M10.5 10.5L14 14" />
                            </svg></span>
                        <input class="search-input" id="globalSearch" placeholder="Search everything…"
                            autocomplete="off">
                    </div>
                </div>
                <div class="topbar-right">
                    <span class="date-pill" id="dateToday"></span>
                </div>
            </div>
            <div class="content" id="content"></div>
        </div>
    </div>

    <!-- MODALS -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalBox"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        /* ============================================================
           CABINET — Personal Productivity OS
           IndexedDB-backed, single-file
           ============================================================ */

        const DB_NAME = 'cabinet_db';
        const DB_VERSION = 2;
        const STORES = ['tasks', 'projects', 'notes', 'ideas', 'goals', 'habits', 'links', 'files', 'events', 'focusSessions', 'audioVault', 'meta'];
        let db;

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const d = e.target.result;
                    STORES.forEach(s => {
                        if (!d.objectStoreNames.contains(s)) {
                            d.createObjectStore(s, { keyPath: 'id' });
                        }
                    });
                };
                req.onsuccess = (e) => { db = e.target.result; resolve(db); };
                req.onerror = (e) => reject(e);
            });
        }

        function txStore(name, mode = 'readonly') {
            return db.transaction(name, mode).objectStore(name);
        }
        function dbGetAll(store) {
            return new Promise((res, rej) => {
                const r = txStore(store).getAll();
                r.onsuccess = () => res(r.result);
                r.onerror = rej;
            });
        }
        function dbPut(store, obj) {
            return new Promise((res, rej) => {
                const r = txStore(store, 'readwrite').put(obj);
                r.onsuccess = () => res(obj);
                r.onerror = rej;
            });
        }
        function dbDelete(store, id) {
            return new Promise((res, rej) => {
                const r = txStore(store, 'readwrite').delete(id);
                r.onsuccess = () => res();
                r.onerror = rej;
            });
        }

        function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
        function todayStr() { return new Date().toISOString().slice(0, 10); }
        function fmtDate(d) {
            if (!d) return '';
            const dt = new Date(d + 'T00:00:00');
            const today = todayStr();
            if (d === today) return 'Today';
            const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
            if (d === tmrw.toISOString().slice(0, 10)) return 'Tomorrow';
            return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 1800);
        }

        /* ===== STATE ===== */
        const state = {
            tasks: [], projects: [], notes: [], ideas: [], goals: [], habits: [], links: [], files: [], events: [], focusSessions: [], audioVault: [],
            view: 'dashboard',
            taskView: 'list', // list|kanban|table
            taskFilter: 'all', // active|today|all|completed
        };

        function normalizeRecord(store, item) {
            if (!item || typeof item !== 'object') return item;
            if (store === 'tasks') {
                return {
                    ...item,
                    tags: Array.isArray(item.tags) ? item.tags : [],
                    subtasks: Array.isArray(item.subtasks) ? item.subtasks : [],
                    links: Array.isArray(item.links) ? item.links : [],
                    notes: item.notes || ''
                };
            }
            if (store === 'notes' || store === 'ideas' || store === 'links' || store === 'files' || store === 'events') {
                return {
                    ...item,
                    tags: Array.isArray(item.tags) ? item.tags : [],
                    links: Array.isArray(item.links) ? item.links : []
                };
            }
            if (store === 'audioVault') {
                return { ...item, tags: Array.isArray(item.tags) ? item.tags : [] };
            }
            return item;
        }

        async function loadAll() {
            for (const s of ['tasks', 'projects', 'notes', 'ideas', 'goals', 'habits', 'links', 'files', 'events', 'focusSessions', 'audioVault']) {
                const rows = await dbGetAll(s);
                state[s] = rows.map(row => normalizeRecord(s, row));
            }
        }

        /* ===== SEED DATA (first run) ===== */
        async function seedIfEmpty() {
            const meta = await dbGetAll('meta');
            if (meta.find(m => m.id === 'seeded')) return;

            const p1 = { id: uid(), name: 'Cabinet Launch', color: '#2F5D4C', createdAt: Date.now(), archived: false };
            await dbPut('projects', p1);

            await dbPut('tasks', {
                id: uid(), title: 'Draft outreach email v2', projectId: p1.id, status: 'in_progress', priority: 'p1',
                dueDate: todayStr(), startDate: todayStr(), tags: ['outreach'], subtasks: [
                    { id: uid(), title: 'Write subject lines', done: true },
                    { id: uid(), title: 'Personalize intro', done: false }
                ], notes: '', links: [], createdAt: Date.now(), completedAt: null, estMins: 30, actualMins: 0
            });

            await dbPut('tasks', {
                id: uid(), title: 'Review Study Cabinet pricing page', projectId: p1.id, status: 'planned', priority: 'p2',
                dueDate: todayStr(), startDate: null, tags: ['pricing'], subtasks: [], notes: '', links: [], createdAt: Date.now(), completedAt: null, estMins: 45, actualMins: 0
            });

            await dbPut('tasks', {
                id: uid(), title: 'Reply to coaching centre leads', projectId: null, status: 'inbox', priority: 'p1',
                dueDate: null, startDate: null, tags: ['leads'], subtasks: [], notes: '', links: [], createdAt: Date.now(), completedAt: null, estMins: 0, actualMins: 0
            });

            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            await dbPut('tasks', {
                id: uid(), title: 'Update Supabase RLS policy', projectId: p1.id, status: 'planned', priority: 'p3',
                dueDate: yesterday.toISOString().slice(0, 10), startDate: null, tags: ['backend'], subtasks: [], notes: '', links: [], createdAt: Date.now(), completedAt: null, estMins: 0, actualMins: 0
            });

            await dbPut('habits', {
                id: uid(), name: 'Morning planning', category: 'Work', frequency: 'daily', days: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'], createdAt: Date.now(),
                completions: { [todayStr()]: true }, streak: 1, longestStreak: 1, notes: ''
            });
            await dbPut('habits', {
                id: uid(), name: 'No screens after 11pm', category: 'Health', frequency: 'daily', days: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'], createdAt: Date.now(),
                completions: {}, streak: 0, longestStreak: 0, notes: ''
            });

            await dbPut('notes', {
                id: uid(), title: 'Welcome to Cabinet', notebookId: null, content: 'This is your personal operating system. Everything you create here — tasks, notes, ideas, goals — is stored locally on this device and linked together.',
                tags: ['welcome'], createdAt: Date.now(), updatedAt: Date.now(), pinned: true, links: []
            });

            await dbPut('ideas', {
                id: uid(), title: 'AI-based at-risk student alerts', status: 'building', category: 'Product', score: 8,
                content: 'EDITH flags students at risk based on attendance + grade trends.', tags: ['edith'], createdAt: Date.now(), links: []
            });

            await dbPut('goals', {
                id: uid(), title: 'Launch Study Cabinet beta with 10 centres', period: 'quarterly', progress: 30,
                milestones: [{ id: uid(), title: 'Finalize pricing', done: true }, { id: uid(), title: 'Build lead list of 50', done: true }, { id: uid(), title: 'Onboard 10 centres', done: false }],
                createdAt: Date.now(), linkedTasks: [], linkedHabits: []
            });

            await dbPut('links', { id: uid(), url: 'https://study-cabinet.vercel.app', title: 'Study Cabinet', description: 'AI-powered student performance platform.', tags: ['reference'], createdAt: Date.now(), archived: false, readingQueue: false });

            await dbPut('meta', { id: 'seeded', value: true });
        }

        /* ===== ROUTER ===== */
        const VIEW_TITLES = {
            dashboard: 'Dashboard', tasks: 'Tasks', calendar: 'Calendar', routines: 'Routines & Habits', goals: 'Goals',
            notes: 'Notebooks', ideas: 'Idea vault', links: 'Link vault', files: 'File vault',
            voice: 'Voice vault', pomodoro: 'Focus timer', analytics: 'Analytics', tools: 'Tools', settings: 'Settings & data'
        };

        function setView(view) {
            state.view = view;
            document.getElementById('pageTitle').textContent = VIEW_TITLES[view] || view;
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.view === view);
            });
            document.getElementById('globalSearch').value = '';
            render();
            if (window.innerWidth <= 880) closeSidebar();
        }

        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', () => setView(el.dataset.view));
        });
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        /* ===== RENDER DISPATCH ===== */
        function render() {
            updateCounts();
            const c = document.getElementById('content');
            switch (state.view) {
                case 'dashboard': c.innerHTML = renderDashboard(); attachDashboardEvents(); break;
                case 'tasks': c.innerHTML = renderTasks(); attachTaskEvents(); break;
                case 'calendar': c.innerHTML = renderCalendar(); setTimeout(attachCalendarEvents, 0); break;
                case 'routines': c.innerHTML = renderHabits(); attachHabitEvents(); break;
                case 'goals': c.innerHTML = renderGoals(); attachGoalEvents(); break;
                case 'notes': c.innerHTML = renderNotes(); attachNoteEvents(); break;
                case 'ideas': c.innerHTML = renderIdeas(); attachIdeaEvents(); break;
                case 'links': c.innerHTML = renderLinks(); attachLinkEvents(); break;
                case 'files': c.innerHTML = renderFiles(); attachFileEvents(); break;
                case 'voice': c.innerHTML = renderVoice(); attachVoiceEvents(); break;
                case 'pomodoro': c.innerHTML = renderPomodoro(); attachPomodoroEvents(); break;
                case 'analytics': c.innerHTML = renderAnalytics(); break;
                case 'tools': c.innerHTML = renderTools(); attachToolsEvents(); break;
                case 'settings': c.innerHTML = renderSettings(); attachSettingsEvents(); break;
                default: c.innerHTML = '<div class="empty-state"><div class="empty-state-title">Not found</div></div>';
            }
        }

        function updateCounts() {
            document.getElementById('count-tasks').textContent = state.tasks.filter(t => t.status !== 'completed' && t.status !== 'archived').length;
            document.getElementById('count-habits').textContent = state.habits.length;
            document.getElementById('count-goals').textContent = state.goals.filter(g => g.progress < 100).length;
            document.getElementById('count-ideas').textContent = state.ideas.length;
        }

        /* ============================================================
           DASHBOARD
           ============================================================ */
        function renderDashboard() {
            const today = todayStr();
            const todays = state.tasks.filter(t => t.dueDate === today && t.status !== 'completed' && t.status !== 'archived');
            const overdue = state.tasks.filter(t => t.dueDate && t.dueDate < today && t.status !== 'completed' && t.status !== 'archived');
            const upcoming = state.tasks.filter(t => t.dueDate && t.dueDate > today && t.status !== 'completed' && t.status !== 'archived')
                .sort((a, b) => a.dueDate.localeCompare(b.dueDate)).slice(0, 5);

            const completedToday = state.tasks.filter(t => t.completedAt && new Date(t.completedAt).toISOString().slice(0, 10) === today).length;

            const recentNotes = [...state.notes].sort((a, b) => b.updatedAt - a.updatedAt).slice(0, 4);
            const recentIdeas = [...state.ideas].sort((a, b) => b.createdAt - a.createdAt).slice(0, 4);
            const readingQueue = state.links.filter(l => l.readingQueue && !l.archived).slice(0, 4);

            const activeGoals = state.goals.filter(g => g.progress < 100).slice(0, 3);

            return `
  <div class="dash-grid">


    <div class="widget">
      <div class="widget-header"><div class="widget-title">Today</div></div>
      <div class="stat-row">
        <div class="stat"><div class="stat-num">${todays.length}</div><div class="stat-label">Due today</div></div>
        <div class="stat"><div class="stat-num">${overdue.length}</div><div class="stat-label">Overdue</div></div>
        <div class="stat"><div class="stat-num">${completedToday}</div><div class="stat-label">Done today</div></div>
      </div>
    </div>

    <div class="widget span-2">
      <div class="widget-header">
        <div class="widget-title">Today's tasks</div>
        <button class="widget-action" data-goto="tasks">View all</button>
      </div>
      ${todays.length || overdue.length ? `
        ${overdue.map(t => taskRowHtml(t, true)).join('')}
        ${todays.map(t => taskRowHtml(t)).join('')}
      ` : `<div class="widget-empty">Nothing due today. Add a task to get started.</div>`}
    </div>

    <div class="widget">
      <div class="widget-header">
        <div class="widget-title">Upcoming</div>
        <button class="widget-action" data-goto="tasks">View all</button>
      </div>
      ${upcoming.length ? upcoming.map(t => taskRowHtml(t)).join('') : `<div class="widget-empty">Nothing scheduled ahead.</div>`}
    </div>

    <div class="widget">
      <div class="widget-header">
        <div class="widget-title">Habit streaks</div>
        <button class="widget-action" data-goto="routines">View all</button>
      </div>
      ${state.habits.length ? state.habits.slice(0, 4).map(h => `
        <div class="item-row" style="cursor:default;">
          <div class="item-body">
            <div class="item-title">${escapeHtml(h.name)}</div>
            <div class="item-meta"><span>${h.streak} day streak</span></div>
          </div>
        </div>
      `).join('') : `<div class="widget-empty">No routines yet.</div>`}
    </div>

    <div class="widget">
      <div class="widget-header">
        <div class="widget-title">Active goals</div>
        <button class="widget-action" data-goto="goals">View all</button>
      </div>
      ${activeGoals.length ? activeGoals.map(g => `
        <div class="item-row" style="cursor:default; display:block;">
          <div class="item-title">${escapeHtml(g.title)}</div>
          <div class="progress-track"><div class="progress-fill" style="width:${g.progress}%"></div></div>
          <div class="item-meta"><span>${g.progress}% · ${g.period}</span></div>
        </div>
      `).join('') : `<div class="widget-empty">No goals yet.</div>`}
    </div>

    <div class="widget">
      <div class="widget-header">
        <div class="widget-title">Focus stats</div>
        <button class="widget-action" data-goto="pomodoro">Open timer</button>
      </div>
      ${renderFocusStatsSmall()}
    </div>

    <div class="widget">
      <div class="widget-header">
        <div class="widget-title">Recent notes</div>
        <button class="widget-action" data-goto="notes">View all</button>
      </div>
      ${recentNotes.length ? recentNotes.map(n => `
        <div class="item-row" data-open-note="${n.id}">
          <div class="item-body">
            <div class="item-title">${escapeHtml(n.title || 'Untitled')}</div>
            <div class="item-meta"><span>${new Date(n.updatedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span></div>
          </div>
        </div>
      `).join('') : `<div class="widget-empty">No notes yet.</div>`}
    </div>

    <div class="widget">
      <div class="widget-header">
        <div class="widget-title">Recent ideas</div>
        <button class="widget-action" data-goto="ideas">View all</button>
      </div>
      ${recentIdeas.length ? recentIdeas.map(i => `
        <div class="item-row" data-open-idea="${i.id}">
          <div class="item-body">
            <div class="item-title">${escapeHtml(i.title)}</div>
            <div class="item-meta"><span class="status-pill">${i.status}</span></div>
          </div>
        </div>
      `).join('') : `<div class="widget-empty">No ideas captured yet.</div>`}
    </div>

    <div class="widget">
      <div class="widget-header">
        <div class="widget-title">Reading queue</div>
        <button class="widget-action" data-goto="links">View all</button>
      </div>
      ${readingQueue.length ? readingQueue.map(l => {
                let host = l.url;
                try { host = new URL(l.url).hostname; } catch (e) { /* keep raw url */ }
                return `
        <div class="item-row" data-open-link="${l.id}">
          <div class="item-body">
            <div class="item-title">${escapeHtml(l.title || l.url)}</div>
            <div class="item-meta"><span>${escapeHtml(host)}</span></div>
          </div>
        </div>`;
            }).join('') : `<div class="widget-empty">Nothing saved to read.</div>`}
    </div>

  </div>`;
        }

        function taskRowHtml(t, overdueFlag = false) {
            const proj = state.projects.find(p => p.id === t.projectId);
            const subDone = t.subtasks.filter(s => s.done).length;
            return `
  <div class="item-row" data-open-task="${t.id}">
    <div class="checkbox ${t.status === 'completed' ? 'checked' : ''}" data-toggle-task="${t.id}"></div>
    <div class="item-body">
      <div class="item-title ${t.status === 'completed' ? 'done' : ''}">${escapeHtml(t.title)}</div>
      <div class="item-meta">
        ${t.priority !== 'p4' ? `<span class="badge badge-${t.priority}">${({ p1: 'High', p2: 'Med', p3: 'Low' })[t.priority] || t.priority}</span>` : ''}
        ${t.dueDate ? `<span style="${overdueFlag ? 'color:var(--warn);font-weight:700;' : ''}">${fmtDate(t.dueDate)}</span>` : ''}
        ${proj ? `<span>${escapeHtml(proj.name)}</span>` : ''}
        ${t.subtasks.length ? `<span>${subDone}/${t.subtasks.length}</span>` : ''}
      </div>
      ${t.subtasks.length ? `
      <div class="subtask-inline-list">
        ${t.subtasks.slice(0, 3).map(s => `
          <div class="subtask-inline-row">
            <div class="subtask-inline-check ${s.done ? 'checked' : ''}" data-toggle-subtask="${t.id}|${s.id}"></div>
            <span class="subtask-inline-title ${s.done ? 'done' : ''}">${escapeHtml(s.title)}</span>
          </div>
        `).join('')}
        ${t.subtasks.length > 3 ? `<div style="font-size:11px;color:var(--ink-faint);padding:2px 4px;">+${t.subtasks.length - 3} more</div>` : ''}
      </div>` : ''}
    </div>
  </div>`;
        }

        function renderFocusStatsSmall() {
            const today = todayStr();
            const todaySessions = state.focusSessions.filter(s => new Date(s.completedAt).toISOString().slice(0, 10) === today);
            const totalMin = todaySessions.reduce((a, s) => a + s.minutes, 0);
            const weekSessions = state.focusSessions.filter(s => Date.now() - s.completedAt < 7 * 86400000);
            return `
    <div class="stat-row">
      <div class="stat"><div class="stat-num">${todaySessions.length}</div><div class="stat-label">Sessions today</div></div>
      <div class="stat"><div class="stat-num">${totalMin}</div><div class="stat-label">Minutes today</div></div>
    </div>
    <div class="item-meta" style="margin-top:10px;">${weekSessions.length} sessions this week</div>
  `;
        }

        function attachDashboardEvents() {
            document.querySelectorAll('[data-goto]').forEach(el => el.addEventListener('click', () => setView(el.dataset.goto)));
            document.querySelectorAll('[data-toggle-task]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); toggleTask(el.dataset.toggleTask); }));
            document.querySelectorAll('[data-toggle-subtask]').forEach(el => el.addEventListener('click', (e) => {
                e.stopPropagation();
                const [taskId, subId] = el.dataset.toggleSubtask.split('|');
                toggleSubtask(taskId, subId);
            }));
            document.querySelectorAll('[data-open-task]').forEach(el => el.addEventListener('click', (e) => { if (e.target.closest('[data-toggle-task]') || e.target.closest('[data-toggle-subtask]') || e.target.closest('.subtask-inline-row')) return; openTaskModal(el.dataset.openTask); }));
            document.querySelectorAll('[data-open-note]').forEach(el => el.addEventListener('click', () => openNoteModal(el.dataset.openNote)));
            document.querySelectorAll('[data-open-idea]').forEach(el => el.addEventListener('click', () => openIdeaModal(el.dataset.openIdea)));
            document.querySelectorAll('[data-open-link]').forEach(el => el.addEventListener('click', () => {
                const link = state.links.find(l => l.id === el.dataset.openLink);
                if (link) window.open(link.url, '_blank');
            }));
        }

        /* ============================================================
           TASKS
           ============================================================ */
        const TASK_STATUSES = ['inbox', 'planned', 'in_progress', 'waiting', 'blocked', 'completed', 'archived'];
        const STATUS_LABELS = { inbox: 'Inbox', planned: 'Planned', in_progress: 'In Progress', waiting: 'Waiting', blocked: 'Blocked', completed: 'Completed', archived: 'Archived' };
        const KANBAN_COLS = ['inbox', 'planned', 'in_progress', 'waiting', 'blocked', 'completed'];

        function renderTasks() {
            let list = [...state.tasks];
            if (state.taskFilter === 'active') list = list.filter(t => t.status !== 'completed' && t.status !== 'archived');
            if (state.taskFilter === 'today') list = list.filter(t => t.dueDate === todayStr());
            if (state.taskFilter === 'completed') list = list.filter(t => t.status === 'completed');

            const toolbar = `
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="view-tabs">
          <button class="view-tab ${state.taskView === 'list' ? 'active' : ''}" data-taskview="list">List</button>
          <button class="view-tab ${state.taskView === 'kanban' ? 'active' : ''}" data-taskview="kanban">Board</button>
          <button class="view-tab ${state.taskView === 'table' ? 'active' : ''}" data-taskview="table">Table</button>
        </div>
        <div class="filter-chip ${state.taskFilter === 'active' ? 'active' : ''}" data-taskfilter="active">Active</div>
        <div class="filter-chip ${state.taskFilter === 'today' ? 'active' : ''}" data-taskfilter="today">Today</div>
        <div class="filter-chip ${state.taskFilter === 'all' ? 'active' : ''}" data-taskfilter="all">All</div>
        <div class="filter-chip ${state.taskFilter === 'completed' ? 'active' : ''}" data-taskfilter="completed">Completed</div>
      </div>
      <button class="btn btn-primary" id="newTaskBtn">+ New task</button>
    </div>
  `;

            if (list.length === 0) {
                return toolbar + `<div class="empty-state"><div class="empty-state-title">No tasks here</div><div class="empty-state-sub">Create a task to start planning.</div></div>`;
            }

            if (state.taskView === 'kanban') return toolbar + renderKanban(list);
            if (state.taskView === 'table') return toolbar + renderTaskTable(list);
            return toolbar + renderTaskList(list);
        }

        function renderTaskList(list) {
            // group by status
            const groups = {};
            TASK_STATUSES.forEach(s => groups[s] = []);
            list.forEach(t => groups[t.status]?.push(t));
            let html = '';
            TASK_STATUSES.forEach(status => {
                const items = groups[status];
                if (!items || !items.length) return;
                items.sort((a, b) => (a.dueDate || '9999').localeCompare(b.dueDate || '9999'));
                html += `<div class="section-block">
      <div class="section-block-header"><span>${STATUS_LABELS[status]}</span><span>${items.length}</span></div>
      ${items.map(t => taskRowFull(t)).join('')}
    </div>`;
            });
            return html;
        }

        function taskRowFull(t) {
            const proj = state.projects.find(p => p.id === t.projectId);
            const subDone = t.subtasks.filter(s => s.done).length;
            const overdue = t.dueDate && t.dueDate < todayStr() && t.status !== 'completed';
            return `
  <div class="task-row">
    <div class="checkbox ${t.status === 'completed' ? 'checked' : ''}" data-toggle-task="${t.id}" style="margin-top:2px;"></div>
    <div class="task-main" data-open-task="${t.id}">
      <div class="task-title ${t.status === 'completed' ? 'done' : ''}">${escapeHtml(t.title)}</div>
      <div class="task-meta" style="margin-bottom:${t.subtasks.length ? '4px' : '0'};">
        ${t.priority !== 'p4' ? `<span class="badge badge-${t.priority}">${({ p1: 'High', p2: 'Med', p3: 'Low' })[t.priority]}</span>` : ''}
        ${t.dueDate ? `<span style="${overdue ? 'color:var(--warn);font-weight:700;' : ''}">${fmtDate(t.dueDate)}</span>` : ''}
        ${proj ? `<span>${escapeHtml(proj.name)}</span>` : ''}
        ${t.estMins ? `<span>${t.estMins}m</span>` : ''}
        ${t.subtasks.length ? `<span>${subDone}/${t.subtasks.length}</span>` : ''}
      </div>
      ${t.subtasks.length ? `
      <div class="subtask-inline-list">
        ${t.subtasks.map(s => `
          <div class="subtask-inline-row">
            <div class="subtask-inline-check ${s.done ? 'checked' : ''}" data-toggle-subtask="${t.id}|${s.id}"></div>
            <span class="subtask-inline-title ${s.done ? 'done' : ''}">${escapeHtml(s.title)}</span>
          </div>
        `).join('')}
      </div>` : ''}
      ${t.tags.length ? `<div class="task-meta" style="margin-top:4px;">${t.tags.map(tag => `<span class="badge badge-tag">${escapeHtml(tag)}</span>`).join('')}</div>` : ''}
      ${t.notes ? `<div class="task-notes-preview">${escapeHtml(t.notes.slice(0, 100))}${t.notes.length > 100 ? '…' : ''}</div>` : ''}
    </div>
  </div>`;
        }

        function renderTaskTable(list) {
            return `<div class="section-block">
    <table style="width:100%; border-collapse:collapse; font-size:13px;">
      <thead><tr style="background:var(--bg);">
        ${['', 'Title', 'Status', 'Priority', 'Due', 'Project', 'Est. min'].map(h => `<th style="text-align:left; padding:10px 12px; font-size:11px; font-weight:500; color:var(--ink-soft); border-bottom:1px solid var(--line);">${h}</th>`).join('')}
      </tr></thead>
      <tbody>
      ${list.map(t => {
                const proj = state.projects.find(p => p.id === t.projectId);
                return `<tr style="border-bottom:1px solid var(--line-soft); cursor:pointer;" data-open-task="${t.id}">
          <td style="padding:8px 12px;"><div class="checkbox ${t.status === 'completed' ? 'checked' : ''}" data-toggle-task="${t.id}"></div></td>
          <td style="padding:8px 12px;" class="${t.status === 'completed' ? 'done' : ''}">${escapeHtml(t.title)}</td>
          <td style="padding:8px 12px; color:var(--ink-soft);">${STATUS_LABELS[t.status]}</td>
          <td style="padding:8px 12px;">${t.priority !== 'p4' ? `<span class="badge badge-${t.priority}">${({ p1: 'High', p2: 'Med', p3: 'Low' })[t.priority]}</span>` : '—'}</td>
          <td style="padding:8px 12px;">${t.dueDate ? fmtDate(t.dueDate) : '—'}</td>
          <td style="padding:8px 12px;">${proj ? escapeHtml(proj.name) : '—'}</td>
          <td style="padding:8px 12px;">${t.estMins || '—'}</td>
        </tr>`;
            }).join('')}
      </tbody>
    </table>
  </div>`;
        }

        function renderKanban(list) {
            return `<div class="kanban">
    ${KANBAN_COLS.map(status => {
                const items = list.filter(t => t.status === status);
                return `<div class="kanban-col">
        <div class="kanban-col-header"><span>${STATUS_LABELS[status]}</span><span>${items.length}</span></div>
        <div class="kanban-col-body" data-col="${status}">
          ${items.map(t => {
                    const subDone = t.subtasks.filter(s => s.done).length;
                    return `<div class="kanban-card" draggable="true" data-task-id="${t.id}">
            <div style="font-weight:600;">${escapeHtml(t.title)}</div>
            <div class="task-meta" style="margin-top:6px;">
              ${t.priority !== 'p4' ? `<span class="badge badge-${t.priority}">${({ p1: 'High', p2: 'Med', p3: 'Low' })[t.priority]}</span>` : ''}
              ${t.dueDate ? `<span>${fmtDate(t.dueDate)}</span>` : ''}
              ${t.subtasks.length ? `<span>${subDone}/${t.subtasks.length}</span>` : ''}
            </div>
          </div>`;
                }).join('')}
        </div>
      </div>`;
            }).join('')}
  </div>`;
        }

        function attachTaskEvents() {
            document.getElementById('newTaskBtn')?.addEventListener('click', () => openTaskModal(null));
            document.querySelectorAll('[data-taskview]').forEach(el => el.addEventListener('click', () => { state.taskView = el.dataset.taskview; render(); }));
            document.querySelectorAll('[data-taskfilter]').forEach(el => el.addEventListener('click', () => { state.taskFilter = el.dataset.taskfilter; render(); }));
            document.querySelectorAll('[data-toggle-task]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); toggleTask(el.dataset.toggleTask); }));
            document.querySelectorAll('[data-toggle-subtask]').forEach(el => el.addEventListener('click', (e) => {
                e.stopPropagation();
                const [taskId, subId] = el.dataset.toggleSubtask.split('|');
                toggleSubtask(taskId, subId);
            }));
            document.querySelectorAll('[data-open-task]').forEach(el => el.addEventListener('click', (e) => {
                if (e.target.closest('[data-toggle-task]')) return;
                if (e.target.closest('[data-toggle-subtask]')) return;
                if (e.target.closest('.subtask-inline-row')) return;
                openTaskModal(el.dataset.openTask);
            }));

            // kanban drag/drop
            document.querySelectorAll('.kanban-card').forEach(card => {
                card.addEventListener('dragstart', (e) => { card.classList.add('dragging'); e.dataTransfer.setData('text/plain', card.dataset.taskId); });
                card.addEventListener('dragend', () => card.classList.remove('dragging'));
                card.addEventListener('click', () => openTaskModal(card.dataset.taskId));
            });
            document.querySelectorAll('.kanban-col-body').forEach(col => {
                col.addEventListener('dragover', (e) => { e.preventDefault(); col.classList.add('dragover'); });
                col.addEventListener('dragleave', () => col.classList.remove('dragover'));
                col.addEventListener('drop', async (e) => {
                    e.preventDefault(); col.classList.remove('dragover');
                    const id = e.dataTransfer.getData('text/plain');
                    const task = state.tasks.find(t => t.id === id);
                    if (task) {
                        task.status = col.dataset.col;
                        if (task.status === 'completed') task.completedAt = Date.now();
                        await dbPut('tasks', task);
                        render();
                    }
                });
            });
        }

        async function toggleTask(id) {
            const t = state.tasks.find(x => x.id === id);
            if (!t) return;
            if (t.status === 'completed') { t.status = 'planned'; t.completedAt = null; }
            else { t.status = 'completed'; t.completedAt = Date.now(); }
            await dbPut('tasks', t);
            await refreshGoalsFromTasks();
            render();
        }

        async function toggleSubtask(taskId, subId) {
            const t = state.tasks.find(x => x.id === taskId);
            if (!t) return;
            const s = t.subtasks.find(x => x.id === subId);
            if (!s) return;
            s.done = !s.done;
            await dbPut('tasks', t);
            state.tasks = await dbGetAll('tasks');
            render();
        }

        async function refreshGoalsFromTasks() {
            // recompute goal progress from linked tasks if any
            for (const g of state.goals) {
                if (g.linkedTasks && g.linkedTasks.length) {
                    const linked = state.tasks.filter(t => g.linkedTasks.includes(t.id));
                    const done = linked.filter(t => t.status === 'completed').length;
                    g.progress = linked.length ? Math.round(done / linked.length * 100) : g.progress;
                    await dbPut('goals', g);
                }
            }
            state.goals = await dbGetAll('goals');
        }

        /* ----- Task Modal ----- */
        function openTaskModal(id) {
            const isNew = !id;
            const t = isNew ? {
                id: uid(), title: '', projectId: null, status: 'inbox', priority: 'p4', dueDate: null, startDate: null,
                tags: [], subtasks: [], notes: '', links: [], createdAt: Date.now(), completedAt: null, estMins: 0, actualMins: 0
            } : state.tasks.find(x => x.id === id);
            if (!t) { toast('Task not found'); return; }

            const box = document.getElementById('modalBox');
            box.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${isNew ? 'New task' : 'Edit task'}</div>
      <button class="modal-close" id="mClose">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Title</label>
        <input class="form-input" id="f-title" value="${escapeHtml(t.title)}" placeholder="What needs to be done?">
      </div>
      <div class="form-row-split form-row">
        <div>
          <label class="form-label">Status</label>
          <select class="form-select" id="f-status">
            ${TASK_STATUSES.map(s => `<option value="${s}" ${t.status === s ? 'selected' : ''}>${STATUS_LABELS[s]}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="form-label">Priority</label>
          <select class="form-select" id="f-priority">
            <option value="p1" ${t.priority === 'p1' ? 'selected' : ''}>High</option>
            <option value="p2" ${t.priority === 'p2' ? 'selected' : ''}>Medium</option>
            <option value="p3" ${t.priority === 'p3' ? 'selected' : ''}>Low</option>
            <option value="p4" ${t.priority === 'p4' ? 'selected' : ''}>None</option>
          </select>
        </div>
      </div>
      <div class="form-row-split form-row">
        <div>
          <label class="form-label">Start date</label>
          <input class="form-input" type="date" id="f-start" value="${t.startDate || ''}">
        </div>
        <div>
          <label class="form-label">Due date</label>
          <input class="form-input" type="date" id="f-due" value="${t.dueDate || ''}">
        </div>
      </div>
      <div class="form-row-split form-row">
        <div>
          <label class="form-label">Project</label>
          <select class="form-select" id="f-project">
            <option value="">None</option>
            ${state.projects.map(p => `<option value="${p.id}" ${t.projectId === p.id ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="form-label">Estimated minutes</label>
          <input class="form-input" type="number" id="f-est" value="${t.estMins || 0}" min="0">
        </div>
      </div>
      <div class="form-row" style="margin-bottom:12px;">
        <label class="form-label">Subtasks</label>
        <div style="border:1px solid var(--line); border-radius:8px; background:var(--surface); min-height:40px;">
          <div id="f-subtasks">
            ${t.subtasks.map(s => `
              <div class="subtask-row" data-subtask-id="${s.id}">
                <div class="checkbox ${s.done ? 'checked' : ''}" data-sub-toggle="${s.id}"></div>
                <input type="text" value="${escapeHtml(s.title)}" data-sub-edit="${s.id}" placeholder="Subtask title">
                <button class="subtask-remove" data-sub-remove="${s.id}">✕</button>
              </div>`).join('')}
          </div>
          <div style="border-top:1px solid var(--line-soft); padding:8px 10px; background:var(--surface-secondary); border-radius:0 0 8px 8px;">
            <input type="text" id="f-new-subtask" placeholder="Add a subtask and press Enter" style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:6px; background:var(--bg); font-size:13.5px; font-family:var(--font); color:var(--ink); outline:none; box-sizing:border-box;">
          </div>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="f-notes" placeholder="Add any notes...">${escapeHtml(t.notes)}</textarea>
      </div>
      <div class="form-row" style="margin-bottom:12px;">
        <label class="form-label">Tags</label>
        <div class="tag-input-row" id="f-tags-row">
          ${t.tags.map(tag => `<span class="tag-chip">${escapeHtml(tag)}<span class="tag-chip-x" data-remove-tag="${escapeHtml(tag)}">×</span></span>`).join('')}
          <input class="tag-input-field" id="f-tag-input" placeholder="Add tag, press enter">
        </div>
      </div>
      ${!isNew ? `<div class="form-row">
        <label class="form-label">Linked items</label>
        <div id="f-links">${renderLinkChips(t)}</div>
        <button class="btn btn-sm" id="f-link-add" style="margin-top:8px;">+ Link to note or idea</button>
      </div>`: ''}
    </div>
    <div class="modal-footer">
      ${!isNew ? `<button class="btn" id="mDelete" style="margin-right:auto; color:var(--warn);">Delete</button>` : ''}
      <button class="btn" id="mCancel">Cancel</button>
      <button class="btn btn-primary" id="mSave">${isNew ? 'Create task' : 'Save changes'}</button>
    </div>
  `;

            let workingTags = [...t.tags];
            let workingSubtasks = JSON.parse(JSON.stringify(t.subtasks));
            let workingLinks = JSON.parse(JSON.stringify(t.links || []));

            document.getElementById('modalOverlay').classList.add('open');

            document.getElementById('mClose').onclick = closeModal;
            document.getElementById('mCancel').onclick = closeModal;

            // tags
            const tagInput = document.getElementById('f-tag-input');
            tagInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && tagInput.value.trim()) {
                    workingTags.push(tagInput.value.trim());
                    tagInput.value = '';
                    refreshTagChips();
                }
            });
            function refreshTagChips() {
                const row = document.getElementById('f-tags-row');
                row.querySelectorAll('.tag-chip').forEach(c => c.remove());
                workingTags.forEach(tag => {
                    const chip = document.createElement('span');
                    chip.className = 'tag-chip';
                    chip.innerHTML = `${escapeHtml(tag)}<span class="tag-chip-x">×</span>`;
                    chip.querySelector('.tag-chip-x').onclick = () => { workingTags = workingTags.filter(x => x !== tag); refreshTagChips(); };
                    row.insertBefore(chip, tagInput);
                });
            }
            document.querySelectorAll('[data-remove-tag]').forEach(el => {
                el.onclick = () => { workingTags = workingTags.filter(x => x !== el.dataset.removeTag); refreshTagChips(); };
            });

            // subtasks
            const newSub = document.getElementById('f-new-subtask');
            newSub.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && newSub.value.trim()) {
                    workingSubtasks.push({ id: uid(), title: newSub.value.trim(), done: false });
                    newSub.value = '';
                    refreshSubtasks();
                }
            });
            function refreshSubtasks() {
                const container = document.getElementById('f-subtasks');
                container.innerHTML = workingSubtasks.map(s => `
      <div class="subtask-row" data-subtask-id="${s.id}">
        <div class="checkbox ${s.done ? 'checked' : ''}" data-sub-toggle="${s.id}"></div>
        <input type="text" value="${escapeHtml(s.title)}" data-sub-edit="${s.id}">
        <button class="subtask-remove" data-sub-remove="${s.id}">✕</button>
      </div>`).join('');
                container.querySelectorAll('[data-sub-toggle]').forEach(el => el.onclick = () => {
                    const s = workingSubtasks.find(x => x.id === el.dataset.subToggle); s.done = !s.done; refreshSubtasks();
                });
                container.querySelectorAll('[data-sub-edit]').forEach(el => el.onchange = () => {
                    const s = workingSubtasks.find(x => x.id === el.dataset.subEdit); s.title = el.value;
                });
                container.querySelectorAll('[data-sub-remove]').forEach(el => el.onclick = () => {
                    workingSubtasks = workingSubtasks.filter(x => x.id !== el.dataset.subRemove); refreshSubtasks();
                });
            }
            refreshSubtasks();

            // links
            if (!isNew) {
                function refreshTaskLinks() {
                    document.getElementById('f-links').innerHTML = renderLinkChips({ links: workingLinks });
                    attachLinkChipEvents(workingLinks, refreshTaskLinks);
                }
                document.getElementById('f-link-add').onclick = () => openLinkPicker((ref) => {
                    workingLinks.push(ref);
                    refreshTaskLinks();
                });
                refreshTaskLinks();
            }

            document.getElementById('mSave').onclick = async () => {
                t.title = document.getElementById('f-title').value.trim() || 'Untitled task';
                t.status = document.getElementById('f-status').value;
                t.priority = document.getElementById('f-priority').value;
                t.startDate = document.getElementById('f-start').value || null;
                t.dueDate = document.getElementById('f-due').value || null;
                t.projectId = document.getElementById('f-project').value || null;
                t.estMins = parseInt(document.getElementById('f-est').value) || 0;
                t.tags = workingTags;
                t.subtasks = workingSubtasks;
                t.notes = document.getElementById('f-notes').value;
                t.links = workingLinks;
                if (t.status === 'completed' && !t.completedAt) t.completedAt = Date.now();
                if (t.status !== 'completed') t.completedAt = null;
                await dbPut('tasks', t);
                state.tasks = await dbGetAll('tasks');
                await refreshGoalsFromTasks();
                closeModal();
                render();
                toast(isNew ? 'Task created' : 'Task saved');
            };

            if (!isNew) {
                document.getElementById('mDelete').onclick = async () => {
                    if (confirm('Delete this task?')) {
                        await dbDelete('tasks', t.id);
                        state.tasks = await dbGetAll('tasks');
                        closeModal();
                        render();
                        toast('Task deleted');
                    }
                };
            }
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
        document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target.id === 'modalOverlay') closeModal(); });

        /* ============================================================
           LINKING (cross-object link chips)
           ============================================================ */
        function renderLinkChips(obj) {
            const links = obj.links || [];
            if (!links.length) return `<span style="color:var(--ink-soft); font-size:12px;">No linked items yet.</span>`;
            return links.map(l => {
                const target = findLinkTarget(l);
                const label = target ? target.title : 'Unknown';
                const icon = { note: '▤', idea: '✦', task: '☑', goal: '◎', link: '∞' }[l.type] || '•';
                return `<span class="link-chip" data-link-type="${l.type}" data-link-id="${l.id}">${icon} ${escapeHtml(label)} <span class="tag-chip-x" data-link-remove="${l.id}">×</span></span>`;
            }).join('');
        }
        function findLinkTarget(l) {
            const map = { note: 'notes', idea: 'ideas', task: 'tasks', goal: 'goals', link: 'links' };
            const arr = state[map[l.type]] || [];
            const obj = arr.find(x => x.id === l.id);
            if (!obj) return null;
            return { title: obj.title || obj.url || 'Untitled' };
        }
        function attachLinkChipEvents(workingLinks, refreshFn) {
            document.querySelectorAll('[data-link-remove]').forEach(el => {
                el.onclick = (e) => {
                    e.stopPropagation();
                    const id = el.dataset.linkRemove;
                    const idx = workingLinks.findIndex(l => l.id === id);
                    if (idx > -1) workingLinks.splice(idx, 1);
                    refreshFn();
                };
            });
            document.querySelectorAll('.link-chip').forEach(el => {
                el.onclick = (e) => {
                    if (e.target.closest('[data-link-remove]')) return;
                    const type = el.dataset.linkType, id = el.dataset.linkId;
                    if (type === 'note') openNoteModal(id);
                    if (type === 'idea') openIdeaModal(id);
                    if (type === 'task') openTaskModal(id);
                    if (type === 'goal') setView('goals');
                };
            });
        }
        function openLinkPicker(onPick) {
            const box = document.getElementById('modalBox');
            const options = [
                ...state.notes.map(n => ({ type: 'note', id: n.id, title: n.title || 'Untitled note' })),
                ...state.ideas.map(i => ({ type: 'idea', id: i.id, title: i.title })),
                ...state.tasks.map(t => ({ type: 'task', id: t.id, title: t.title })),
            ];
            box.innerHTML = `
    <div class="modal-header"><div class="modal-title">Link to…</div><button class="modal-close" id="lpClose">×</button></div>
    <div class="modal-body">
      <input class="form-input" id="lpSearch" placeholder="Search notes, ideas, tasks…" style="margin-bottom:12px;">
      <div id="lpResults" style="max-height:320px; overflow-y:auto;">
        ${options.map(o => `<div class="item-row" data-pick="${o.type}|${o.id}"><div class="item-body"><div class="item-title">${({ note: '▤', idea: '✦', task: '☑' })[o.type]} ${escapeHtml(o.title)}</div></div></div>`).join('')}
      </div>
    </div>
  `;
            document.getElementById('modalOverlay').classList.add('open');
            document.getElementById('lpClose').onclick = closeModal;
            document.getElementById('lpSearch').addEventListener('input', (e) => {
                const q = e.target.value.toLowerCase();
                document.querySelectorAll('#lpResults .item-row').forEach(row => {
                    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
                });
            });
            document.querySelectorAll('[data-pick]').forEach(el => {
                el.onclick = () => {
                    const [type, id] = el.dataset.pick.split('|');
                    onPick({ type, id });
                    closeModal();
                };
            });
        }

        /* ============================================================
           CALENDAR — Month / Week / Day views
           ============================================================ */
        state.calView = 'month';
        state.calDate = new Date();

        function renderCalendar() {
            const header = renderCalHeader();
            let body = '';
            if (state.calView === 'month') body = renderCalMonth();
            else if (state.calView === 'week') body = renderCalWeek();
            else if (state.calView === 'day') body = renderCalDay();
            else body = renderCalList();
            return header + body;
        }

        function renderCalHeader() {
            const d = state.calDate;
            let title = '';
            if (state.calView === 'month') {
                title = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            } else if (state.calView === 'week') {
                const start = startOfWeek(d);
                const end = new Date(start);
                end.setDate(end.getDate() + 6);
                const s = start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const e = end.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                title = s + ' – ' + e;
            } else if (state.calView === 'day') {
                title = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            } else {
                title = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            }
            return `
  <div class="cal-header">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="calPrev">‹</button>
      <span class="cal-nav-title">${title}</span>
      <button class="cal-nav-btn" id="calNext">›</button>
      <button class="cal-today-btn" id="calToday">Today</button>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="cal-view-tabs">
        <button class="cal-view-tab ${state.calView === 'month' ? 'active' : ''}" data-calview="month">Month</button>
        <button class="cal-view-tab ${state.calView === 'week' ? 'active' : ''}" data-calview="week">Week</button>
        <button class="cal-view-tab ${state.calView === 'day' ? 'active' : ''}" data-calview="day">Day</button>
        <button class="cal-view-tab ${state.calView === 'list' ? 'active' : ''}" data-calview="list">List</button>
      </div>
      <button class="btn btn-primary" id="newEventBtn" style="padding:6px 14px;font-size:12px;">+ New event</button>
    </div>
  </div>`;
        }

        function startOfWeek(date) {
            const d = new Date(date);
            const day = d.getDay();
            d.setDate(d.getDate() - day);
            return d;
        }

        function getAllItemsForDate(dateStr) {
            const items = [];
            state.tasks.forEach(t => {
                if (t.dueDate === dateStr) items.push({ type: 'task', id: t.id, title: t.title, done: t.status === 'completed', tags: t.tags, priority: t.priority || 'p4', status: t.status });
            });
            const dow = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long' });
            state.events.forEach(e => {
                const rec = e.recurring;
                if (!rec) {
                    if (e.date === dateStr) items.push({ type: 'event', id: e.id, title: e.title, time: e.time || '', notes: e.notes || '', tags: e.tags || [], recurring: false, occDate: null });
                } else {
                    const days = e.recurringDays || [];
                    if (days.includes(dow)) {
                        const s = e.recurringStart;
                        const en = e.recurringEnd;
                        if (s && dateStr >= s && (!en || dateStr <= en)) {
                            const times = e.recurringTimes || {};
                            const time = times[dow] || '';
                            items.push({ type: 'event', id: e.id, title: e.title, time, notes: e.notes || '', tags: e.tags || [], recurring: true, occDate: dateStr });
                        }
                    }
                }
            });
            items.sort((a, b) => {
                const ta = a.time || '99:99';
                const tb = b.time || '99:99';
                return ta.localeCompare(tb);
            });
            return items;
        }

        function renderCalMonth() {
            const d = state.calDate;
            const year = d.getFullYear(), month = d.getMonth();
            const first = new Date(year, month, 1);
            const startDay = first.getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrev = new Date(year, month, 0).getDate();
            const today = todayStr();

            let cells = '';
            for (let i = startDay - 1; i >= 0; i--) {
                const day = daysInPrev - i;
                const prevDate = new Date(year, month, 0);
                prevDate.setDate(day);
                const dateStr = prevDate.toISOString().slice(0, 10);
                const items = getAllItemsForDate(dateStr);
                cells += `<div class="cal-month-cell other-month" data-cal-date="${dateStr}">
                  <div class="cal-cell-day">${day}</div>
                  ${items.slice(0, 3).map(it => `<div class="cal-cell-event ${it.type}-type ${it.done ? 'done' : ''} ${it.recurring ? 'occ' : ''}" data-cal-item="${it.type}|${it.id}"${it.occDate ? ` data-cal-occ-date="${it.occDate}"` : ''}>${escapeHtml(it.title)}${it.recurring ? '<span class="rec-indicator">↻</span>' : ''}</div>`).join('')}
                  ${items.length > 3 ? `<div class="cal-cell-more">+${items.length - 3} more</div>` : ''}
                </div>`;
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = dateStr === today;
                const items = getAllItemsForDate(dateStr);
                cells += `<div class="cal-month-cell ${isToday ? 'today' : ''}" data-cal-date="${dateStr}">
                  <div class="cal-cell-day">${day}</div>
                  ${items.slice(0, 4).map(it => `<div class="cal-cell-event ${it.type}-type ${it.done ? 'done' : ''} ${it.recurring ? 'occ' : ''}" data-cal-item="${it.type}|${it.id}"${it.occDate ? ` data-cal-occ-date="${it.occDate}"` : ''}>${escapeHtml(it.title)}${it.recurring ? '<span class="rec-indicator">↻</span>' : ''}</div>`).join('')}
                  ${items.length > 4 ? `<div class="cal-cell-more">+${items.length - 4} more</div>` : ''}
                </div>`;
            }
            const remaining = 42 - (startDay + daysInMonth);
            for (let day = 1; day <= remaining; day++) {
                const nextDate = new Date(year, month + 1, day);
                const dateStr = nextDate.toISOString().slice(0, 10);
                cells += `<div class="cal-month-cell other-month" data-cal-date="${dateStr}">
                  <div class="cal-cell-day">${day}</div>
                </div>`;
            }

            return `
  <div class="cal-month-grid">
    ${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => `<div class="cal-month-header-cell">${d}</div>`).join('')}
    ${cells}
  </div>`;
        }

        function renderCalWeek() {
            const start = startOfWeek(state.calDate);
            const today = todayStr();
            const days = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(start);
                d.setDate(d.getDate() + i);
                days.push(d);
            }

            let headerCells = '<div class="cal-week-header-cell"></div>';
            days.forEach(d => {
                const dateStr = d.toISOString().slice(0, 10);
                const isToday = dateStr === today;
                headerCells += `<div class="cal-week-header-cell ${isToday ? 'today-col' : ''}">
                  ${d.toLocaleDateString('en-US', { weekday: 'short' })}
                  <span class="cal-week-header-day">${d.getDate()}</span>
                </div>`;
            });

            // All-day items (tasks + events without time)
            let allDayMap = {};
            days.forEach(d => {
                const dateStr = d.toISOString().slice(0, 10);
                const items = getAllItemsForDate(dateStr);
                allDayMap[dateStr] = items.filter(it => !it.time || it.type === 'task');
            });

            let allDayCells = '<div class="cal-week-hour" style="min-height:auto;padding:4px 6px;font-size:8px;color:var(--ink-faint);font-weight:700;text-transform:uppercase;"></div>';
            days.forEach(d => {
                const dateStr = d.toISOString().slice(0, 10);
                const ad = allDayMap[dateStr];
                allDayCells += `<div class="cal-week-cell" style="min-height:auto;padding:2px;display:flex;flex-wrap:wrap;gap:2px;border-bottom:2px solid var(--line-soft);" data-cal-date="${dateStr}">
                  ${ad.slice(0, 4).map(it => `<div class="cal-all-day-item ${it.type}-type ${it.done ? 'done' : ''}" data-cal-item="${it.type}|${it.id}"${it.occDate ? ` data-cal-occ-date="${it.occDate}"` : ''}>${escapeHtml(it.title)}</div>`).join('')}
                  ${ad.length > 4 ? `<span style="font-size:9px;color:var(--ink-faint);font-weight:600;padding:1px 4px;">+${ad.length - 4}</span>` : ''}
                </div>`;
            });

            let rows = allDayCells;
            for (let hour = 0; hour < 24; hour++) {
                const timeLabel = hour === 0 ? '12AM' : hour < 12 ? hour + 'AM' : hour === 12 ? '12PM' : (hour - 12) + 'PM';
                rows += `<div class="cal-week-hour">${timeLabel}</div>`;
                days.forEach(d => {
                    const dateStr = d.toISOString().slice(0, 10);
                    const isToday = dateStr === today;
                    const items = getAllItemsForDate(dateStr).filter(it => it.time && it.type === 'event' && it.time.startsWith(`${String(hour).padStart(2, '0')}`));
                    rows += `<div class="cal-week-cell ${isToday ? 'today-col' : ''}" data-cal-date="${dateStr}" data-cal-hour="${hour}">
                      ${items.map(it => `<div class="cal-week-event ${it.type}-type ${it.recurring ? 'occ' : ''}" data-cal-item="${it.type}|${it.id}"${it.occDate ? ` data-cal-occ-date="${it.occDate}"` : ''}>${escapeHtml(it.title)}${it.recurring ? '<span class="rec-indicator">↻</span>' : ''}</div>`).join('')}
                    </div>`;
                });
            }

            return `
  <div class="cal-week-grid" style="grid-template-columns:52px repeat(7,1fr);">
    ${headerCells}
    ${rows}
  </div>`;
        }

        function renderCalDay() {
            const d = state.calDate;
            const dateStr = d.toISOString().slice(0, 10);
            const today = todayStr();

            const allItems = getAllItemsForDate(dateStr);
            const allDayItems = allItems.filter(it => !it.time || it.type === 'task');
            const timedItems = allItems.filter(it => it.time && it.type === 'event');

            let allDayHtml = '';
            if (allDayItems.length) {
                allDayHtml = `<div class="cal-all-day-row">
                  <span class="cal-all-day-label">All day</span>
                  <div class="cal-all-day-items">
                    ${allDayItems.map(it => `<span class="cal-all-day-item ${it.type}-type ${it.done ? 'done' : ''}" data-cal-item="${it.type}|${it.id}"${it.occDate ? ` data-cal-occ-date="${it.occDate}"` : ''}>${escapeHtml(it.title)}</span>`).join('')}
                  </div>
                </div>`;
            }

            let rows = '';
            for (let hour = 0; hour < 24; hour++) {
                const timeLabel = hour === 0 ? '12AM' : hour < 12 ? hour + 'AM' : hour === 12 ? '12PM' : (hour - 12) + 'PM';
                const items = timedItems.filter(it => it.time.startsWith(`${String(hour).padStart(2, '0')}`));
                rows += `<div class="cal-day-hour">${timeLabel}</div>
                <div class="cal-day-cell" data-cal-date="${dateStr}" data-cal-hour="${hour}">
                  ${items.map(it => {
                    const timeHtml = `<span class="cal-event-time">${it.time}</span>`;
                    const tagHtml = it.tags && it.tags.length ? it.tags.map(t => `<span class="cal-event-tag">${escapeHtml(t)}</span>`).join('') : '';
                    return `<div class="cal-day-event ${it.type}-type ${it.recurring ? 'occ' : ''}" data-cal-item="${it.type}|${it.id}"${it.occDate ? ` data-cal-occ-date="${it.occDate}"` : ''}>${timeHtml}${escapeHtml(it.title)}${tagHtml}${it.recurring ? '<span class="rec-indicator">↻</span>' : ''}</div>`;
                }).join('')}
                </div>`;
            }

            return allDayHtml + `
  <div class="cal-day-grid">
    ${rows}
  </div>`;
        }


        function renderCalList() {
            const d = state.calDate;
            const year = d.getFullYear(), month = d.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = todayStr();
            const now = new Date();
            const startDate = new Date(year, month, 1);
            // Show up to 60 days for better visibility
            const totalDays = Math.min(daysInMonth + 7, 60);
            let html = '';
            for (let day = 1; day <= totalDays; day++) {
                const dateObj = new Date(year, month, day);
                if (dateObj.getMonth() !== month && day > daysInMonth + 6) break;
                if (dateObj.getMonth() !== month) continue;
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const items = getAllItemsForDate(dateStr);
                if (!items.length) continue;
                const isToday = dateStr === today;
                const dayLabel = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
                html += `<div class="cal-list-date-header ${isToday ? 'today-header' : ''}">${dayLabel}</div>`;
                items.forEach(it => {
                    const dotClass = it.type === 'event' ? 'event-dot' : 'task-dot';
                    const timeHtml = it.time ? `<span class="cal-list-time">${it.time}</span>` : '<span class="cal-list-time">—</span>';
                    const recHtml = it.recurring ? '<span class="cal-list-rec">↻</span>' : '';
                    const tagHtml = it.tags && it.tags.length ? `<span class="cal-list-tags">${it.tags.map(t => `<span class="cal-list-tag">${escapeHtml(t)}</span>`).join('')}</span>` : '';
                    html += `<div class="cal-list-item" data-cal-item="${it.type}|${it.id}"${it.occDate ? ` data-cal-occ-date="${it.occDate}"` : ''}>
                      ${timeHtml}
                      <span class="cal-list-dot ${dotClass}"></span>
                      <span class="cal-list-title ${it.done ? 'done' : ''}">${escapeHtml(it.title)}${recHtml}</span>
                      <span class="cal-list-type-badge ${it.type}">${it.type}</span>
                      ${tagHtml}
                    </div>`;
                });
            }
            return `<div class="cal-list">${html}</div>`;
        }
        function attachCalendarEvents() {
            document.getElementById('calPrev').addEventListener('click', () => {
                if (state.calView === 'month' || state.calView === 'list') {
                    state.calDate.setMonth(state.calDate.getMonth() - 1);
                } else if (state.calView === 'week') {
                    state.calDate.setDate(state.calDate.getDate() - 7);
                } else {
                    state.calDate.setDate(state.calDate.getDate() - 1);
                }
                render();
            });
            document.getElementById('calNext').addEventListener('click', () => {
                if (state.calView === 'month' || state.calView === 'list') {
                    state.calDate.setMonth(state.calDate.getMonth() + 1);
                } else if (state.calView === 'week') {
                    state.calDate.setDate(state.calDate.getDate() + 7);
                } else {
                    state.calDate.setDate(state.calDate.getDate() + 1);
                }
                render();
            });
            document.getElementById('calToday').addEventListener('click', () => {
                state.calDate = new Date();
                render();
            });
            document.querySelectorAll('[data-calview]').forEach(el => {
                el.addEventListener('click', () => { state.calView = el.dataset.calview; render(); });
            });
            document.getElementById('newEventBtn').addEventListener('click', () => openEventModal(null));

            // Click on a day cell to switch to day view
            document.querySelectorAll('[data-cal-date]').forEach(el => {
                el.addEventListener('dblclick', () => {
                    const dateStr = el.dataset.calDate;
                    state.calDate = new Date(dateStr + 'T12:00:00');
                    openEventModal(null, dateStr);
                });
                el.addEventListener('click', () => {
                    const dateStr = el.dataset.calDate;
                    state.calDate = new Date(dateStr + 'T12:00:00');
                    state.calView = 'day';
                    render();
                });
            });

            // Click on an event/task item to open it
            document.querySelectorAll('[data-cal-item]').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const [type, id] = el.dataset.calItem.split('|');
                    const occDate = el.dataset.calOccDate || null;
                    if (type === 'task') openTaskModal(id);
                    if (type === 'event') openEventModal(id, null, occDate);
                });
            });
        }

        function openEventModal(id, presetDate, occDate) {
            const isNew = !id;
            let workingTags = [];
            let e;
            let isRecurringOccurrence = false;

            if (isNew) {
                e = { id: uid(), title: '', date: presetDate || todayStr(), time: '', endTime: '', notes: '', tags: [], createdAt: Date.now(), recurring: false };
            } else {
                e = state.events.find(x => x.id === id);
                if (!e) return;
                if (occDate && e.recurring) {
                    isRecurringOccurrence = true;
                    const times = e.recurringTimes || {};
                    const dow = new Date(occDate + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long' });
                    e = { ...e, date: occDate, time: times[dow] || '' };
                }
            }

            workingTags = [...(e.tags || [])];
            const rec = e.recurring;
            const recDays = rec ? (e.recurringDays || []) : [];
            const recTimes = rec ? (e.recurringTimes || {}) : {};
            const recStart = rec ? (e.recurringStart || e.date || '') : '';
            const recEnd = rec ? (e.recurringEnd || '') : '';
            const allDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

            function renderRecurringForm() {
                const dayGrid = allDays.map(d => {
                    const checked = recDays.includes(d);
                    const t = recTimes[d] || '';
                    return `<div class="rec-day-item ${checked ? 'active' : ''}" data-rec-day="${d}">
                        <input type="checkbox" ${checked ? 'checked' : ''}>
                        <span class="rec-day-label">${d.slice(0, 3)}</span>
                        <input class="rec-day-time" type="time" value="${t}" ${checked ? '' : 'disabled'}>
                    </div>`;
                }).join('');

                return `
      <div class="rec-field">
        <label class="form-label">Start date</label>
        <input class="form-input" type="date" id="rec-start" value="${recStart}">
      </div>
      <div class="rec-field">
        <label class="form-label">End date <span style="font-weight:400;color:var(--ink-faint);">(optional)</span></label>
        <input class="form-input" type="date" id="rec-end" value="${recEnd}">
      </div>
      <div class="rec-field">
        <label class="form-label">Repeat on</label>
        <div class="rec-day-grid" id="rec-day-grid">
          ${dayGrid}
        </div>
      </div>`;
            }

            function renderOnceForm() {
                return `
      <div class="form-row-split form-row" style="margin-bottom:8px;">
        <div><label class="form-label">Date</label><input class="form-input" type="date" id="ev-date" value="${e.date}"></div>
        <div><label class="form-label">Time</label><input class="form-input" type="time" id="ev-time" value="${e.time}"></div>
      </div>
      <div class="form-row-split form-row" style="margin-bottom:8px;">
        <div><label class="form-label">End date <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink-faint);">(optional)</span></label><input class="form-input" type="date" id="ev-end-date" value="${e.endDate || ''}"></div>
        <div><label class="form-label">End time <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink-faint);">(optional)</span></label><input class="form-input" type="time" id="ev-end-time" value="${e.endTime || ''}"></div>
      </div>`;
            }

            const box = document.getElementById('modalBox');
            box.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${isNew ? 'New event' : (isRecurringOccurrence ? 'Edit occurrence' : 'Edit event')}</div>
      <button class="modal-close" id="mClose">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row"><label class="form-label">Title</label><input class="form-input" id="ev-title" value="${escapeHtml(e.title)}" placeholder="Event title"></div>
      ${isRecurringOccurrence ? `<div style="font-size:11px;color:var(--ink-soft);margin-bottom:12px;padding:6px 10px;background:var(--accent-soft);border-radius:6px;">This is a recurring event. Changes will apply to all occurrences.</div>` : `
      <div class="rec-field">
        <label class="form-label">Type</label>
        <div class="rec-toggle-group" id="rec-toggle">
          <button class="rec-toggle-btn ${!rec ? 'active' : ''}" data-rec-type="once">Once</button>
          <button class="rec-toggle-btn ${rec ? 'active' : ''}" data-rec-type="recurring">Recurring</button>
        </div>
      </div>`}
      <div id="rec-form-body">
        ${isRecurringOccurrence ? renderOnceForm() : (rec ? renderRecurringForm() : renderOnceForm())}
      </div>
      <div class="form-row"><label class="form-label">Notes</label><textarea class="form-textarea" id="ev-notes" placeholder="Add notes...">${escapeHtml(e.notes)}</textarea></div>
      <div class="form-row">
